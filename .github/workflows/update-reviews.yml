name: Update Trustpilot Reviews

on:
  schedule:
    - cron: "0 7 * * *"   # Every day at 7:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run incremental scraper
        run: python scraper.py

      - name: Categorise new reviews
        run: python categorise.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.db
          git diff --staged --quiet || git commit -m "Update reviews $(date -u +%Y-%m-%d)"
          git push
